<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="隧道收費">
    <link rel="apple-touch-icon" href="https://img.icons8.com">
    <title>香港隧道收費</title>
    <style>
        :root { --bg: #f2f2f7; --card: #ffffff; --text: #1c1c1e; --primary: #007AFF; --tl: #5856D6; --win: #34C759; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: calc(env(safe-area-inset-top) + 15px) 10px 20px; color: var(--text); }
        .header { text-align: center; margin-bottom: 15px; }
        #clock { font-size: 40px; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .tag { display: inline-block; background: var(--primary); color: white; padding: 4px 12px; border-radius: 15px; font-size: 13px; font-weight: 600; margin-top: 5px; }
        
        /* 四隧橫排網格 */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 15px; }
        .item { background: var(--card); border-radius: 14px; padding: 12px 2px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .name { font-size: 11px; color: #8e8e93; font-weight: 600; margin-bottom: 4px; white-space: nowrap; }
        .price { font-size: 22px; font-weight: 800; }
        .price span { font-size: 12px; margin-right: 1px; }
        
        .p-tl { color: var(--tl); }
        .p-3t { color: var(--primary); }

        .info-bar { background: var(--win); color: white; border-radius: 14px; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 12px rgba(52, 199, 89, 0.2); }
        .info-label { font-size: 13px; font-weight: 600; }
        .info-val { font-size: 15px; font-weight: 800; text-align: right; }
        .footer { text-align: center; font-size: 10px; color: #8e8e93; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <div id="clock">--:--</div>
        <div class="tag" id="period">讀取中...</div>
    </div>

    <div class="grid">
        <div class="item"><div class="name">大欖</div><div class="price p-tl" id="tl"><span>$</span>--</div></div>
        <div class="item"><div class="name">西隧</div><div class="price p-3t" id="wh"><span>$</span>--</div></div>
        <div class="item"><div class="name">紅隧</div><div class="price p-3t" id="ch"><span>$</span>--</div></div>
        <div class="item"><div class="name">東隧</div><div class="price p-3t" id="eh"><span>$</span>--</div></div>
    </div>

    <div class="info-bar" id="cdBox">
        <div class="info-label">距離平價時段</div>
        <div class="info-val" id="cd">--</div>
    </div>

    <div class="footer">
        大欖自2025年5月收回後新收費：$45/$30/$18<br>
        三隧分時段收費：$60/$40、$30、$20
    </div>

    <script>
        function fmt(mins) {
            if (mins <= 0) return "現正平價";
            const h = Math.floor(mins / 60), m = mins % 60;
            return h > 0 ? `${h}h ${m}m` : `${m}m`;
        }

        function update() {
            const n = new Date(), h = n.getHours(), m = n.getMinutes(), total = h * 60 + m, d = n.getDay();
            document.getElementById('clock').innerText = n.toLocaleTimeString('zh-HK', {hour12:false, hour:'2-digit', minute:'2-digit'});

            let tl = 18, w = 20, x = 20, p = "非繁忙 (平)";
            const isWD = d >= 1 && d <= 5, isSat = d === 6;

            if (isWD || isSat) {
                if ((total >= 450 && total < 615) || (total >= 1050 && total < 1140)) {
                    tl = 45; w = 60; x = 40; p = "繁忙時段";
                } else if (total >= 615 && total < 1050) {
                    tl = 30; w = 30; x = 30; p = "一般時段";
                }
            } else { // 星期日
                if (total >= 615 && total < 1110) { tl = 30; w = 25; x = 25; p = "一般時段"; }
            }

            document.getElementById('tl').innerHTML = `<span>$</span>${tl}`;
            document.getElementById('wh').innerHTML = `<span>$</span>${w}`;
            document.getElementById('ch').innerHTML = `<span>$</span>${x}`;
            document.getElementById('eh').innerHTML = `<span>$</span>${x}`;
            document.getElementById('period').innerText = p;

            const target = (d === 0) ? 1110 : 1140; // 日 18:30, 其他 19:00
            if (p === "非繁忙 (平)") {
                document.getElementById('cd').innerText = "最抵用！";
                document.getElementById('cdBox').style.background = "var(--win)";
            } else {
                let diff = target - total;
                if (diff < 0) diff = (1440 - total) + 450;
                document.getElementById('cd').innerText = fmt(diff);
                document.getElementById('cdBox').style.background = "#FF9500";
            }
        }
        setInterval(update, 10000); update();
    </script>
</body>
</html>
